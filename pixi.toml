[workspace]
authors = ["hakutaku <qq20099@outlook.com>"]
channels = ["conda-forge"]
name = "diff-svc"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[system-requirements]
cuda = "12.0"

[dependencies]
cmake = ">=4.2.3,<5"
make = ">=4.4.1,<5"
pytorch-gpu = "*"
torchaudio = ">=2.10.0,<3"
setuptools = ">=70.0.0,<72"

[pypi-dependencies]
torchcrepe = ">=0.0.24, <0.0.25"
praat-parselmouth = ">=0.4.7, <0.5"
scikit-image = ">=0.26.0, <0.27"
ipython = ">=9.10.0, <10"
ipykernel = ">=7.2.0, <8"
pyloudnorm = ">=0.2.0, <0.3"
webrtcvad = ">=2.0.10, <3"
h5py = ">=3.15.1, <4"
einops = ">=0.8.2, <0.9"
pycwt = ">=0.5.0b0, <0.6"
torchmetrics = "==0.5"
pytorch-lightning = ">=1.6.5.post0, <2"
